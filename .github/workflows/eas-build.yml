name: EAS Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "Build profile"
        required: true
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  # Job 1: Run tests and linting
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧹 Run linter
        run: npm run lint --if-present

      - name: 🧪 Run tests
        run: npm test --if-present

  # Job 2: Bump version for production builds
  bump-version:
    name: Bump App Version
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.profile == 'production'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔖 Bump patch version in app.json
        id: bump
        run: |
          CURRENT=$(node -p "require('./app.json').expo.version")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '$NEW_VERSION';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: 📝 Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

  # Job 3: Build for iOS
  build-ios:
    name: Build iOS App
    runs-on: ubuntu-latest
    needs: [test, bump-version]
    if: |
      always() &&
      needs.test.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') &&
      (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔐 Create ASC API key file
        if: github.event.inputs.profile == 'production'
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY_P8 }}" > AuthKey.p8

      - name:  Build iOS app (production)
        if: github.event.inputs.profile == 'production'
        env:
          EXPO_ASC_API_KEY_PATH: ./AuthKey.p8
          EXPO_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: W7Q9YP35BN
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.APPLE_TEAM_TYPE }}
        run: |
          PROFILE=${{ github.event.inputs.profile || 'development' }}
          eas build --platform ios --profile $PROFILE --non-interactive --no-wait

      - name:  Build iOS app (non-production)
        if: github.event.inputs.profile != 'production'
        run: |
          PROFILE=${{ github.event.inputs.profile || 'development' }}
          eas build --platform ios --profile $PROFILE --non-interactive --no-wait

  # Job 4: Build for Android
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: [test, bump-version]
    if: |
      always() &&
      needs.test.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') &&
      (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Install dependencies
        run: npm ci

      - name:  Build Android app
        run: |
          PROFILE=${{ github.event.inputs.profile || 'development' }}
          eas build --platform android --profile $PROFILE --non-interactive --no-wait

  # Job 5: Submit to stores (only for production builds)
  submit:
    name: Submit to App Stores
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.profile == 'production' &&
      (needs.build-ios.result == 'success' || needs.build-android.result == 'success')
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔐 Create Android service account key
        if: |
          (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') &&
          needs.build-android.result == 'success'
        run: |
          echo '${{ secrets.ANDROID_SERVICE_ACCOUNT_KEY_JSON }}' > service-account-key.json

      - name: 🔐 Create ASC API key file
        if: |
          (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') &&
          needs.build-ios.result == 'success'
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY_P8 }}" > AuthKey.p8

      - name: 🚀 Submit to iOS App Store
        if: |
          (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') &&
          needs.build-ios.result == 'success'
        env:
          EXPO_ASC_API_KEY_PATH: ./AuthKey.p8
          EXPO_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: W7Q9YP35BN
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.APPLE_TEAM_TYPE }}
        run: eas submit --platform ios --latest --non-interactive

      - name: 🚀 Submit to Google Play Store
        if: |
          (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') &&
          needs.build-android.result == 'success'
        run: eas submit --platform android --latest --non-interactive
